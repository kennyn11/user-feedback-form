<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Submit Your Feedback</h2>
        
        <form id="feedback-form">
            <div class="field-group">
                <label for="username">User Name:</label>
                <input type="text" id="username" placeholder="Enter your name">
                <small id="name-counter">0/50</small>
            </div>

            <div class="field-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
                <small id="email-counter">0/80</small>
            </div>

            <div class="field-group">
                <label for="comments">Comments:</label>
                <textarea id="comments" placeholder="Share your feedback"></textarea>
                <small id="comments-counter">0/500</small>
            </div>

            <button type="submit">Submit</button>
        </form>

        <hr>
        <h3>Feedback Display</h3>
        <div id="submitted-feedback">
            </div>
    </div>

    <script src="cp_1.js"></script>
</body>
</html>
