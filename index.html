<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Send us your thoughts</h2>
        <form id="feedback-form">
            <div class="field-group">
                <input type="text" id="username" name="username" placeholder="User Name" data-tooltip="Enter your full name">
                <span class="char-count">0 characters</span>
            </div>

            <div class="field-group">
                <input type="email" id="email" name="email" placeholder="Email Address" data-tooltip="Enter your email">
                <span class="char-count">0 characters</span>
            </div>

            <div class="field-group">
                <textarea id="comments" name="comments" placeholder="Comments" data-tooltip="Share us your feedback!"></textarea>
                <span class="char-count">0 characters</span>
            </div>

            <button type="submit">Submit Feedback</button>
            <p id="error-msg" style="color: red;"></p>
        </form>

        <hr>
        <h3>Feedback Entries</h3>
        <div id="feedback-display"></div>
    </div>

    <div id="tooltip-box" class="hidden"></div>

    <script src="cp_1.js"></script>
</body>
</html>
